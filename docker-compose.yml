services:
  app:
    build: .
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      # Mount public/ assets locally to avoid slow Windows→WSL2 file transfer.
      # Remove these volumes on Linux VPS (assets are baked into the image).
      - ./public/emoji:/app/public/emoji:ro
      - ./public/fonts:/app/public/fonts:ro
